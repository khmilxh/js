<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>煤分析计算器</title>
    <style>
        *{box-sizing:border-box}
        body{font-family:"Microsoft YaHei",sans-serif;background:#f4f4f9;margin:0;padding:20px;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .calculator{background:#fff;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,0.1);width:100%;max-width:360px;padding:28px}
        /* 仅新增：整体红色警示样式 */
        .calculator.red{background:#ffebee;border:2px solid #d32f2f;}
        h2{text-align:center;color:#333;margin:0 0 20px;font-size:20px;line-height:1.4}
        .item{margin-bottom:14px}
        label{display:block;margin-bottom:5px;font-size:14px;color:#333}
        input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;box-sizing:border-box;font-size:15px}
        input:focus{border-color:#007bff;outline:none}
        input[readonly]{background:#f7f8fa;color:#333;font-weight:bold}
        .result input{background:#e8f5e9;color:#2e7d32;border-color:#c8e6c9}
        button{width:100%;padding:12px;background:#007bff;color:#fff;border:none;border-radius:6px;font-size:16px;margin-top:10px;cursor:pointer}
        button:hover{background:#0056b3}
    </style>
</head>
<body>
<!-- 仅新增：给计算器容器加id="calcWrap" -->
<div class="calculator" id="calcWrap">
    <h2>二分中心化验室<br>联合分析室<br>煤分析计算器</h2>
    <div class="item">
        <label>空坩埚重 (g)</label>
        <input type="number" id="w1" step="0.0001">
    </div>
    <div class="item">
        <label>烘前样重 (g)</label>
        <input type="number" id="w2" step="0.0001">
    </div>
    <div class="item">
        <label>烘后坩埚 (g)</label>
        <input type="number" id="w3" step="0.0001">
    </div>
    <div class="item">
        <label>样品失重 (g)</label>
        <input id="w4" readonly>
    </div>
    <div class="item result">
        <label>碳含量 (%)</label>
        <input id="result" readonly>
    </div>
    <button onclick="calc()">计算</button>
</div>
<script>
function calc() {
    let w1 = parseFloat(document.getElementById('w1').value) || 0;
    let w2 = parseFloat(document.getElementById('w2').value) || 0;
    let w3 = parseFloat(document.getElementById('w3').value) || 0;
    let totalBefore = w1 + w2;
    let loss = totalBefore - w3;
    document.getElementById('w4').value = loss.toFixed(4);
    // 仅新增：获取计算器容器
    const calcWrap = document.getElementById('calcWrap');
    if (w2 > 0) {
        let carbon = (loss / w2 * 100);
        document.getElementById('result').value = carbon.toFixed(2) + ' %';
        // 仅新增：判定异常并控制红色样式
        if (loss < 0 || carbon < 0 || carbon > 100) {
            calcWrap.classList.add('red');
        } else {
            calcWrap.classList.remove('red');
        }
    } else {
        document.getElementById('result').value = '';
        // 仅新增：样重为0时恢复原样式
        calcWrap.classList.remove('red');
    }
}
</script>
</body>
</html>
